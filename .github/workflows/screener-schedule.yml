name: Screener Pipeline

on:
  schedule:
    # Weekly: Monday 03:00 UTC (06:00 Istanbul)
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_universe:
        description: "Run Universe Builder"
        required: false
        default: true
        type: boolean
      run_screener:
        description: "Run Feature Screener"
        required: false
        default: true
        type: boolean

env:
  PYTHONPATH: backend

jobs:
  screener-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache price data
        uses: actions/cache@v4
        with:
          path: backend/artifacts/raw/prices
          key: prices-${{ hashFiles('backend/config/screener_config.yaml') }}-week-${{ github.run_id }}
          restore-keys: |
            prices-${{ hashFiles('backend/config/screener_config.yaml') }}-week-

      - name: Create artifacts directory
        run: mkdir -p backend/artifacts/universes backend/artifacts/runs backend/artifacts/raw/prices

      - name: Run Universe Builder
        if: ${{ github.event.inputs.run_universe != 'false' }}
        working-directory: backend
        run: |
          python -m screener universe_builder \
            --config config/screener_config.yaml \
            --output artifacts/universes
        continue-on-error: false

      - name: Run Feature Screener
        if: ${{ github.event.inputs.run_screener != 'false' }}
        working-directory: backend
        run: |
          python -m screener feature_screener \
            --universe artifacts/universes/latest/universe.json \
            --config config/screener_config.yaml \
            --output artifacts/runs
        continue-on-error: false

      - name: List generated artifacts
        run: |
          echo "=== Universe Artifacts ==="
          ls -la backend/artifacts/universes/ || true
          echo "=== Run Artifacts ==="
          ls -la backend/artifacts/runs/ || true

      - name: Upload screener artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screener-results-${{ github.run_id }}
          path: |
            backend/artifacts/universes/
            backend/artifacts/runs/
          retention-days: 90
          if-no-files-found: warn

      - name: Update challenger.json from screener output
        if: ${{ github.event.inputs.run_screener != 'false' }}
        working-directory: backend
        run: |
          SELECTED=$(find artifacts/runs -name "selected_symbols.json" -path "*/latest/*" 2>/dev/null | head -1)
          if [ -z "$SELECTED" ]; then
            SELECTED=$(find artifacts/runs -name "selected_symbols.json" | sort | tail -1)
          fi
          if [ -n "$SELECTED" ] && [ -f "$SELECTED" ]; then
            echo "Updating challenger.json from: $SELECTED"
            cp "$SELECTED" config/symbol_sets/challenger.json
          else
            echo "No selected_symbols.json found, skipping challenger update"
          fi

      - name: Commit updated challenger.json
        id: commit_challenger
        if: ${{ github.event.inputs.run_screener != 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/config/symbol_sets/challenger.json
          if git diff --cached --quiet; then
            echo "No changes to challenger.json"
            echo "challenger_updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(screener): update challenger.json from screener run $(date +%Y%m%d)"
            git push
            echo "challenger_updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Champion/Challenger Backtest
        if: ${{ steps.commit_challenger.outputs.challenger_updated == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Challenger set updated — triggering backtest with oos_end=$TODAY"
          gh workflow run backtest.yml \
            --ref main \
            --field champion_path="backend/config/symbol_sets/active.json" \
            --field challenger_path="backend/config/symbol_sets/challenger.json" \
            --field oos_start="2025-04-01" \
            --field oos_end="$TODAY" \
            --field include_tft="true"
          echo "Backtest workflow dispatched successfully"
