name: Champion/Challenger Backtest

on:
    # Manual run from the Actions UI
    workflow_dispatch:
        inputs:
            champion_path:
                description: "Path to champion symbol set JSON"
                required: true
                default: "backend/config/symbol_sets/active.json"
            challenger_path:
                description: "Path to challenger selected_symbols.json"
                required: true
                default: "backend/config/symbol_sets/challenger.json"
            oos_start:
                description: "OOS start date (YYYY-MM-DD)"
                required: false
                default: "2025-04-01"
            oos_end:
                description: "OOS end date (YYYY-MM-DD)"
                required: false
                default: "2026-03-18"
            include_tft:
                description: "Include TFT-ASRO vs XGBoost comparison"
                required: false
                default: "true"
                type: choice
                options:
                    - "false"
                    - "true"

    # Reusable: invoked from tft-training.yml right after a successful
    # training run so ValidationPage gets a fresh BacktestReport without
    # manual intervention.
    workflow_call:
        inputs:
            champion_path:
                type: string
                required: false
                default: "backend/config/symbol_sets/active.json"
            challenger_path:
                type: string
                required: false
                default: "backend/config/symbol_sets/challenger.json"
            oos_start:
                type: string
                required: false
                default: "2025-04-01"
            oos_end:
                type: string
                required: false
                default: "2026-03-18"
            include_tft:
                type: string
                required: false
                default: "true"
        secrets:
            DATABASE_URL:
                required: false

jobs:
    backtest:
        runs-on: ubuntu-latest
        # 90 min cap — rolling retrain loop is the bottleneck.
        timeout-minutes: 90

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install yfinance xgboost

            - name: Run backtest
              env:
                  # Inject DATABASE_URL so BacktestReport rows are persisted
                  # to the production Postgres instance; ValidationPage reads
                  # from this table. When the secret isn't configured the
                  # runner gracefully falls back to filesystem-only output.
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  PYTHONPATH: backend
              run: |
                  CHAMPION_PATH="${{ inputs.champion_path || github.event.inputs.champion_path }}"
                  CHALLENGER_PATH="${{ inputs.challenger_path || github.event.inputs.challenger_path }}"
                  OOS_START="${{ inputs.oos_start || github.event.inputs.oos_start }}"
                  OOS_END="${{ inputs.oos_end || github.event.inputs.oos_end }}"
                  INCLUDE_TFT="${{ inputs.include_tft || github.event.inputs.include_tft }}"

                  TFT_FLAG=""
                  if [ "$INCLUDE_TFT" = "true" ]; then
                    TFT_FLAG="--include-tft"
                  fi

                  python -m backend.backtest.runner \
                    --champion "$CHAMPION_PATH" \
                    --challenger "$CHALLENGER_PATH" \
                    --oos-start "$OOS_START" \
                    --oos-end "$OOS_END" \
                    --output-dir backend/artifacts/backtests \
                    $TFT_FLAG

            - name: Upload backtest artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: backtest-results
                  path: backend/artifacts/backtests/
                  retention-days: 90

            - name: Display results
              run: |
                  echo "=== BACKTEST RESULTS ==="
                  for f in backend/artifacts/backtests/*_report.json; do
                    echo "--- $f ---"
                    python -m json.tool "$f"
                  done
