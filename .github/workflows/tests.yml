name: Tests

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - "frontend/**"
            - ".github/workflows/tests.yml"
    pull_request:
        branches:
            - main
        paths:
            - "backend/**"
            - "frontend/**"
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              working-directory: backend
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx

            - name: Run tests (offline only)
              working-directory: backend
              run: |
                  pytest tests/ -v --tb=short --junitxml=pytest-results.xml -m "not online"
              env:
                  TOKENIZERS_PARALLELISM: "false"

            - name: Audit backend dependencies
              working-directory: backend
              run: |
                  python -m pip install pip-audit
                  # These advisories currently have no usable fixed release for
                  # the resolver output used by the TFT stack. Keep the audit
                  # strict for any new advisory by ignoring only these IDs.
                  pip-audit -r requirements.txt \
                    --ignore-vuln PYSEC-2025-217 \
                    --ignore-vuln PYSEC-2025-214 \
                    --ignore-vuln PYSEC-2025-218 \
                    --ignore-vuln PYSEC-2025-211 \
                    --ignore-vuln PYSEC-2025-212 \
                    --ignore-vuln PYSEC-2025-213 \
                    --ignore-vuln PYSEC-2025-215 \
                    --ignore-vuln PYSEC-2025-216 \
                    --ignore-vuln PYSEC-2025-210 \
                    --ignore-vuln PYSEC-2025-194 \
                    --ignore-vuln PYSEC-2025-196 \
                    --ignore-vuln PYSEC-2025-195 \
                    --ignore-vuln PYSEC-2025-193 \
                    --ignore-vuln PYSEC-2025-192 \
                    --ignore-vuln PYSEC-2026-139 \
                    --ignore-vuln PYSEC-2025-191 \
                    --ignore-vuln PYSEC-2025-197 \
                    --ignore-vuln PYSEC-2025-189 \
                    --ignore-vuln PYSEC-2025-190 \
                    --ignore-vuln PYSEC-2024-277 \
                    --ignore-vuln PYSEC-2025-183

            - name: Audit frontend dependencies
              working-directory: frontend
              run: |
                  npm audit --audit-level=high

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results
                  path: backend/pytest-results.xml
                  retention-days: 7
